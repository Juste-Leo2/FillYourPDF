<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FillYourPDF - Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(147, 51, 234, 0.15) 0%, transparent 50%);
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-weight: 800;
            font-size: 2rem;
            background: -webkit-linear-gradient(45deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #e2e8f0;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-group span {
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            font-size: 0.9rem;
            min-height: 20px;
            color: #a7f3d0;
            font-weight: 600;
        }

        .error-msg {
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FillYourPDF</h1>
        <p class="subtitle">Convert your PDFs into local interactive documents.</p>

        <form id="convertForm">
            <div class="form-group">
                <label for="pathInput">File or directory path:</label>
                <input type="text" id="pathInput" placeholder="Ex: C:\Users\Name\Documents\my_pdf.pdf" required>
            </div>

            <label class="checkbox-group">
                <input type="checkbox" id="zipCheckbox">
                <span>Compress output as .zip</span>
            </label>

            <button type="submit" id="submitBtn">Convert</button>
        </form>

        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        const form = document.getElementById('convertForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let pathValue = document.getElementById('pathInput').value.trim();
            if (pathValue.startsWith('"') && pathValue.endsWith('"')) {
                pathValue = pathValue.slice(1, -1);
            }
            
            const isZip = document.getElementById('zipCheckbox').checked;

            if (!pathValue) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Converting...';
            statusMessage.textContent = '';
            statusMessage.className = 'status';

            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ path: pathValue, zip: isZip })
                });

                const result = await response.json();

                if (response.ok) {
                    statusMessage.textContent = '✅ ' + result.message;
                } else {
                    statusMessage.textContent = '❌ Error: ' + (result.error || 'Unknown error');
                    statusMessage.className = 'status error-msg';
                }
            } catch (error) {
                statusMessage.textContent = '❌ Error communicating with the local server.';
                statusMessage.className = 'status error-msg';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Convert';
            }
        });
    </script>
</body>
</html>
