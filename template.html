<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FillYourPDF Document</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f3f4f6;
            font-family: Arial, sans-serif;
            touch-action: none;
        }

        /* Navigation en haut */
        #page-nav {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 5px 10px;
            gap: 10px;
            z-index: 20;
        }

        #page-nav button {
            width: 32px;
            height: 32px;
            font-size: 14px;
            background: transparent;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        #page-nav button:hover:not(:disabled) { background: #e5e7eb; }
        #page-nav button:disabled { opacity: 0.3; cursor: not-allowed; }

        .page-info {
            font-size: 14px;
            font-weight: bold;
            color: #4b5563;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #page-input {
            width: 40px;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 4px;
            font-size: 14px;
            font-weight: bold;
            background: #f9fafb;
        }
        
        #page-input::-webkit-outer-spin-button, #page-input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        #page-input[type=number] { -moz-appearance: textfield; }

        #app-container {
            width: 100%;
            height: calc(100% - 60px);
            position: relative;
            overflow: hidden;
        }

        #workspace {
            position: absolute;
            transform-origin: 0 0;
        }

        .page-container {
            position: relative;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin: 20px;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #pdf-canvas { z-index: 1; }
        #draw-canvas { z-index: 2; }
        
        #text-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .text-annotation {
            position: absolute;
            pointer-events: auto;
            border: 1px dashed transparent;
            padding: 4px;
            min-width: 20px;
            min-height: 20px;
            font-family: Arial, sans-serif;
            outline: none;
            background: transparent;
            white-space: pre-wrap;
            word-wrap: break-word;
            cursor: text;
            line-height: 1.2;
        }
        .text-annotation:focus, .text-annotation:hover {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.7);
        }

        .rect-annotation {
            position: absolute;
            pointer-events: auto;
            border: 1px dashed transparent;
            cursor: move;
        }
        .rect-annotation:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 5px rgba(59, 130, 246, 0.5);
        }

        /* Toolbar */
        #toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }

        .tool-btn {
            border: none;
            background: #f3f4f6;
            border-radius: 12px;
            width: 48px;
            height: 48px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #4b5563;
        }

        .tool-btn:hover { background: #e5e7eb; }
        .tool-btn.active { background: #3b82f6; color: white; }

        .tool-options {
            display: none;
            position: fixed;
            bottom: 75px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            gap: 8px;
            z-index: 10;
        }

        .tool-options.visible { display: flex; }

        .option-btn {
            width: 36px;
            height: 36px;
            font-size: 14px;
            border: 2px solid transparent;
            background: #f3f4f6;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-btn.active {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        #export-btn {
            width: auto;
            padding: 0 20px;
            font-size: 16px;
            font-weight: bold;
            background: #10b981;
            color: white;
            margin-left: 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            height: 48px;
            transition: 0.2s;
        }

        #export-btn:hover:not(:disabled) { background: #059669; }
        #export-btn:disabled { opacity: 0.5; cursor: wait; }

        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loader">Chargement...</div>

    <div id="page-nav" style="display: none;">
        <button id="btn-prev-page" title="Page Précédente">◀</button>
        <div class="page-info">
            <input type="number" id="page-input" value="1" min="1"> / <span id="page-total">-</span>
        </div>
        <button id="btn-next-page" title="Page Suivante">▶</button>
    </div>

    <div id="app-container">
        <div id="workspace">
            <div class="page-container" id="page-container">
                <canvas id="pdf-canvas"></canvas>
                <canvas id="draw-canvas"></canvas>
                <div id="text-layer"></div>
            </div>
        </div>
    </div>

    <div id="pen-options" class="tool-options" style="left: calc(50% - 130px);">
        <button class="option-btn active" data-size="2" style="border-radius: 50%;">
            <div style="width: 4px; height: 4px; background: currentColor; border-radius: 50%;"></div>
        </button>
        <button class="option-btn" data-size="5" style="border-radius: 50%;">
            <div style="width: 10px; height: 10px; background: currentColor; border-radius: 50%;"></div>
        </button>
        <button class="option-btn" data-size="12" style="border-radius: 50%;">
            <div style="width: 18px; height: 18px; background: currentColor; border-radius: 50%;"></div>
        </button>
    </div>

    <div id="text-options" class="tool-options" style="left: calc(50% - 70px);">
        <button class="option-btn" data-size="12">P</button>
        <button class="option-btn active" data-size="18">M</button>
        <button class="option-btn" data-size="28">G</button>
    </div>

    <div id="rect-options" class="tool-options" style="left: calc(50% - 10px);">
        <button class="option-btn active" data-color="white" style="border: 1px solid #d1d5db;">
            <div style="width: 20px; height: 20px; background: white; border: 1px solid #ccc;"></div>
        </button>
        <button class="option-btn" data-color="black">
            <div style="width: 20px; height: 20px; background: black;"></div>
        </button>
    </div>

    <div id="toolbar">
        <button id="btn-main" class="tool-btn active" title="Main (Déplacer/Zoomer)">✋</button>
        <button id="btn-pen" class="tool-btn" title="Stylo (Dessiner)">✏️</button>
        <button id="btn-text" class="tool-btn" title="Texte">T</button>
        <button id="btn-rect" class="tool-btn" title="Rectangle (Masquer/Censurer)">⬛</button>
        <button id="export-btn">Exporter PDF</button>
    </div>

    <script id="pdf-data" type="text/plain">{{PDF_BASE64}}</script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Variables d'état Global
        let currentMode = 'MAIN'; // 'MAIN', 'PEN', 'TEXT', 'RECT'
        let currentPenSize = 2;
        let currentTextSize = 18;
        let currentRectColor = 'white';
        
        let transform = { scale: 1, x: 0, y: 0 };
        let isPanning = false, startPan = { x: 0, y: 0 };
        let isDrawing = false, lastDrawPoint = null;
        
        let isDrawingRect = false;
        let startRectPoint = null;
        let currentRectElement = null;

        // Variables Multi-pages
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 1;
        let pagesData = []; // Stockage virtuel : { drawingDataUrl: str, textElements: [DOMElement] }

        const RENDER_SCALE = 2.0;

        // DOM
        const appContainer = document.getElementById('app-container');
        const workspace = document.getElementById('workspace');
        const pageContainer = document.getElementById('page-container');
        const pdfCanvas = document.getElementById('pdf-canvas');
        const drawCanvas = document.getElementById('draw-canvas');
        const textLayer = document.getElementById('text-layer');
        const loader = document.getElementById('loader');
        
        const pdfCtx = pdfCanvas.getContext('2d');
        const drawCtx = drawCanvas.getContext('2d');

        async function init() {
            const base64Data = document.getElementById('pdf-data').textContent.trim();
            
            if (!base64Data || base64Data === '{{PDF_BASE64}}') {
                loader.innerText = "Mode Dev : Aucun PDF injecté.";
                setupCanvas(1000, 1400);
                centerDocument();
                return;
            }

            try {
                const binaryString = window.atob(base64Data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);

                pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
                totalPages = pdfDoc.numPages;
                
                document.getElementById('page-total').innerText = totalPages;
                document.getElementById('page-input').max = totalPages;
                document.getElementById('page-nav').style.display = totalPages > 1 ? 'flex' : 'none';

                for (let i = 1; i <= totalPages; i++) {
                    pagesData[i] = { drawingDataUrl: null, textElements: [] };
                }

                await loadPage(1);

            } catch (err) {
                console.error("Erreur chargement PDF:", err);
                loader.innerText = "Erreur de chargement du PDF.";
            }
        }

        async function loadPage(pageNum) {
            if (pageNum < 1 || pageNum > totalPages) return;
            
            loader.style.display = 'block';
            
            if (pdfDoc && drawCanvas.width > 0) saveCurrentPageData();

            currentPage = pageNum;
            
            document.getElementById('page-input').value = currentPage;
            document.getElementById('btn-prev-page').disabled = currentPage === 1;
            document.getElementById('btn-next-page').disabled = currentPage === totalPages;

            try {
                const pdfPage = await pdfDoc.getPage(currentPage);
                const viewport = pdfPage.getViewport({ scale: RENDER_SCALE });

                setupCanvas(viewport.width, viewport.height);

                await pdfPage.render({ canvasContext: pdfCtx, viewport: viewport }).promise;

                restoreCurrentPageData();
                centerDocument();
                loader.style.display = 'none';
            } catch (err) {
                console.error("Erreur page:", err);
            }
        }

        function saveCurrentPageData() {
            pagesData[currentPage].drawingDataUrl = drawCanvas.toDataURL();
            // Les rectangles et les textes partagent la même logique de layer !
            pagesData[currentPage].textElements = Array.from(textLayer.children);
            textLayer.innerHTML = '';
        }

        function restoreCurrentPageData() {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            textLayer.innerHTML = '';
            const data = pagesData[currentPage];
            
            if (data.drawingDataUrl) {
                const img = new Image();
                img.onload = () => drawCtx.drawImage(img, 0, 0);
                img.src = data.drawingDataUrl;
            }

            if (data.textElements.length > 0) {
                data.textElements.forEach(el => textLayer.appendChild(el));
            }
        }

        // Navigation UI
        document.getElementById('btn-prev-page').addEventListener('click', () => loadPage(currentPage - 1));
        document.getElementById('btn-next-page').addEventListener('click', () => loadPage(currentPage + 1));
        
        document.getElementById('page-input').addEventListener('change', (e) => {
            let val = parseInt(e.target.value);
            if (isNaN(val) || val < 1) val = 1;
            if (val > totalPages) val = totalPages;
            e.target.value = val;
            if (val !== currentPage) loadPage(val);
        });

        function setupCanvas(w, h) {
            pageContainer.style.width = `${w}px`;
            pageContainer.style.height = `${h}px`;
            pdfCanvas.width = w; pdfCanvas.height = h;
            drawCanvas.width = w; drawCanvas.height = h;
            drawCtx.lineCap = 'round'; drawCtx.lineJoin = 'round'; drawCtx.strokeStyle = 'black';
        }

        function centerDocument() {
            const rect = appContainer.getBoundingClientRect();
            transform.scale = Math.min((rect.width - 40) / pdfCanvas.width, (rect.height - 40) / pdfCanvas.height);
            transform.x = (rect.width - pdfCanvas.width * transform.scale) / 2;
            transform.y = (rect.height - pdfCanvas.height * transform.scale) / 2;
            updateTransform();
        }

        function updateTransform() {
            workspace.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`;
        }

        // Toolbar UI
        document.getElementById('btn-main').addEventListener('click', () => setMode('MAIN'));
        document.getElementById('btn-pen').addEventListener('click', () => setMode('PEN'));
        document.getElementById('btn-text').addEventListener('click', () => setMode('TEXT'));
        document.getElementById('btn-rect').addEventListener('click', () => setMode('RECT'));

        document.querySelectorAll('#pen-options .option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#pen-options .option-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentPenSize = parseInt(e.currentTarget.dataset.size);
            });
        });

        document.querySelectorAll('#text-options .option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#text-options .option-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentTextSize = parseInt(e.currentTarget.dataset.size);
            });
        });

        document.querySelectorAll('#rect-options .option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#rect-options .option-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentRectColor = e.currentTarget.dataset.color;
            });
        });

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(mode === 'MAIN' ? 'btn-main' : mode === 'PEN' ? 'btn-pen' : mode === 'TEXT' ? 'btn-text' : 'btn-rect').classList.add('active');
            
            document.getElementById('pen-options').classList.toggle('visible', mode === 'PEN');
            document.getElementById('text-options').classList.toggle('visible', mode === 'TEXT');
            document.getElementById('rect-options').classList.toggle('visible', mode === 'RECT');

            drawCanvas.style.cursor = mode === 'MAIN' ? 'grab' : (mode === 'PEN' || mode === 'RECT') ? 'crosshair' : 'text';
        }

        // Zoom / Pan events
        appContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.ctrlKey || e.metaKey || currentMode === 'MAIN') {
                const zoomFactor = Math.exp((e.deltaY < 0 ? 1 : -1) * 0.002 * 20);
                const rect = appContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
                transform.x = mouseX - (mouseX - transform.x) * zoomFactor;
                transform.y = mouseY - (mouseY - transform.y) * zoomFactor;
                transform.scale = Math.max(0.1, Math.min(transform.scale * zoomFactor, 5));
                updateTransform();
            } else {
                transform.x -= e.deltaX;
                transform.y -= e.deltaY;
                updateTransform();
            }
        }, { passive: false });

        function getCanvasCoords(e) {
            const rect = drawCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) / transform.scale, y: (clientY - rect.top) / transform.scale };
        }

        let initialPinchDist = null, initialScale = 1;

        drawCanvas.addEventListener('mousedown', handlePointerDown);
        drawCanvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isDrawing = isPanning = isDrawingRect = false;
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initialScale = transform.scale;
            } else if (e.touches.length === 1) handlePointerDown(e);
        }, { passive: false });

        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDist) {
                e.preventDefault();
                const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                transform.scale = Math.max(0.1, Math.min(initialScale * (currentDist / initialPinchDist), 5));
                updateTransform();
            } else if (e.touches.length === 1) handlePointerMove(e);
        }, { passive: false });

        window.addEventListener('mouseup', handlePointerUp);
        window.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) initialPinchDist = null;
            handlePointerUp(e);
        });

        function handlePointerDown(e) {
            if (currentMode === 'MAIN' || e.button === 1 || e.button === 2) {
                isPanning = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startPan = { x: clientX - transform.x, y: clientY - transform.y };
                if (currentMode === 'MAIN') drawCanvas.style.cursor = 'grabbing';
            } else if (currentMode === 'PEN') {
                isDrawing = true;
                lastDrawPoint = getCanvasCoords(e);
                drawCtx.lineWidth = currentPenSize * RENDER_SCALE;
                drawCtx.beginPath();
                drawCtx.arc(lastDrawPoint.x, lastDrawPoint.y, (currentPenSize * RENDER_SCALE) / 2, 0, Math.PI * 2);
                drawCtx.fill();
            } else if (currentMode === 'RECT') {
                isDrawingRect = true;
                startRectPoint = getCanvasCoords(e);
                
                currentRectElement = document.createElement('div');
                currentRectElement.className = 'rect-annotation';
                currentRectElement.style.backgroundColor = currentRectColor;
                currentRectElement.style.left = `${startRectPoint.x}px`;
                currentRectElement.style.top = `${startRectPoint.y}px`;
                currentRectElement.style.width = '0px';
                currentRectElement.style.height = '0px';
                
                attachDraggableEvents(currentRectElement, true);
                textLayer.appendChild(currentRectElement);
            } else if (currentMode === 'TEXT') {
                const coords = getCanvasCoords(e);
                addTextAnnotation(coords.x, coords.y);
                setMode('MAIN');
            }
        }

        function handlePointerMove(e) {
            if (isPanning) {
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                transform.x = clientX - startPan.x;
                transform.y = clientY - startPan.y;
                updateTransform();
            } else if (isDrawing && currentMode === 'PEN') {
                e.preventDefault();
                const coords = getCanvasCoords(e);
                drawCtx.lineWidth = currentPenSize * RENDER_SCALE;
                drawCtx.beginPath();
                drawCtx.moveTo(lastDrawPoint.x, lastDrawPoint.y);
                drawCtx.lineTo(coords.x, coords.y);
                drawCtx.stroke();
                lastDrawPoint = coords;
            } else if (isDrawingRect && currentMode === 'RECT') {
                e.preventDefault();
                const coords = getCanvasCoords(e);
                const x = Math.min(startRectPoint.x, coords.x);
                const y = Math.min(startRectPoint.y, coords.y);
                const w = Math.abs(coords.x - startRectPoint.x);
                const h = Math.abs(coords.y - startRectPoint.y);
                
                currentRectElement.style.left = `${x}px`;
                currentRectElement.style.top = `${y}px`;
                currentRectElement.style.width = `${w}px`;
                currentRectElement.style.height = `${h}px`;
            }
        }

        function handlePointerUp() {
            isPanning = isDrawing = false;
            
            if (isDrawingRect && currentRectElement) {
                const w = parseFloat(currentRectElement.style.width);
                const h = parseFloat(currentRectElement.style.height);
                if (w < 5 || h < 5) {
                    currentRectElement.remove(); // Evite les micro-clics
                }
            }
            isDrawingRect = false;
            currentRectElement = null;

            if (currentMode === 'MAIN') drawCanvas.style.cursor = 'grab';
        }

        function attachDraggableEvents(el, isRect = false) {
            let isDragging = false, startPos = {x: 0, y: 0};
            
            const onDown = (e) => {
                if ((currentMode !== 'TEXT' && currentMode !== 'RECT') && document.activeElement !== el) {
                    isDragging = true;
                    startPos = { x: e.clientX || e.touches[0].clientX, y: e.clientY || e.touches[0].clientY, left: parseFloat(el.style.left), top: parseFloat(el.style.top) };
                    e.stopPropagation();
                }
            };

            el.addEventListener('mousedown', onDown);
            el.addEventListener('touchstart', (e) => { if (e.touches.length === 1) onDown(e); }, {passive: false});

            const onMove = (e) => {
                if (isDragging) {
                    const clientX = e.clientX || e.touches[0].clientX;
                    const clientY = e.clientY || e.touches[0].clientY;
                    el.style.left = `${startPos.left + (clientX - startPos.x) / transform.scale}px`;
                    el.style.top = `${startPos.top + (clientY - startPos.y) / transform.scale}px`;
                }
            };

            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', (e) => { if(isDragging) { e.preventDefault(); onMove(e); } }, {passive: false});

            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('touchend', () => isDragging = false);

            // Double clic / tap pour supprimer
            let lastTap = 0;
            const handleDelete = (e) => {
                e.preventDefault(); e.stopPropagation();
                el.remove();
            };
            el.addEventListener('dblclick', handleDelete);
            el.addEventListener('touchend', (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 500 && tapLength > 0) {
                    handleDelete(e);
                }
                lastTap = currentTime;
            });

            if (!isRect) {
                el.addEventListener('blur', () => { if (el.innerText.trim() === '') el.remove(); });
            }
        }

        function addTextAnnotation(x, y) {
            const div = document.createElement('div');
            div.className = 'text-annotation';
            div.contentEditable = true;
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            div.style.fontSize = `${currentTextSize * RENDER_SCALE}px`;
            
            attachDraggableEvents(div, false);
            textLayer.appendChild(div);
            setTimeout(() => div.focus(), 50);
        }

        // Export Multi-pages
        document.getElementById('export-btn').addEventListener('click', async () => {
            if(!pdfDoc) return;
            const btn = document.getElementById('export-btn');
            btn.innerText = "Génération...";
            btn.disabled = true;
            loader.innerText = "Exportation en cours, veuillez patienter...";
            loader.style.display = 'block';

            saveCurrentPageData();

            try {
                const { jsPDF } = window.jspdf;
                let pdf = null;

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdfDoc.getPage(i);
                    const viewport = page.getViewport({ scale: RENDER_SCALE });
                    
                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = viewport.width;
                    finalCanvas.height = viewport.height;
                    const finalCtx = finalCanvas.getContext('2d');
                    
                    finalCtx.fillStyle = 'white';
                    finalCtx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

                    await page.render({ canvasContext: finalCtx, viewport: viewport }).promise;
                    
                    const pData = pagesData[i];
                    
                    // 1. Appliquer Dessin
                    if (pData && pData.drawingDataUrl) {
                        await new Promise((resolve) => {
                            const img = new Image();
                            img.onload = () => { finalCtx.drawImage(img, 0, 0); resolve(); };
                            img.src = pData.drawingDataUrl;
                        });
                    }
                    
                    // 2. Appliquer Elements du DOM (Textes & Rectangles)
                    if (pData && pData.textElements) {
                        pData.textElements.forEach(el => {
                            const x = parseFloat(el.style.left);
                            const y = parseFloat(el.style.top);

                            if (el.className.includes('rect-annotation')) {
                                const w = parseFloat(el.style.width);
                                const h = parseFloat(el.style.height);
                                finalCtx.fillStyle = el.style.backgroundColor;
                                finalCtx.fillRect(x, y, w, h);
                            } else {
                                const fontSize = parseFloat(el.style.fontSize);
                                finalCtx.font = `${fontSize}px Arial`;
                                finalCtx.fillStyle = 'black';
                                finalCtx.textBaseline = 'top';
                                
                                const lines = el.innerText.split('\n');
                                let currentY = y + 4;
                                lines.forEach(line => {
                                    finalCtx.fillText(line, x + 4, currentY);
                                    currentY += fontSize * 1.2;
                                });
                            }
                        });
                    }

                    const imgData = finalCanvas.toDataURL('image/jpeg', 0.95);
                    const orientation = finalCanvas.width > finalCanvas.height ? 'l' : 'p';
                    
                    if (!pdf) {
                        pdf = new jsPDF(orientation, 'px', [finalCanvas.width, finalCanvas.height]);
                    } else {
                        pdf.addPage([finalCanvas.width, finalCanvas.height], orientation);
                    }
                    
                    pdf.addImage(imgData, 'JPEG', 0, 0, finalCanvas.width, finalCanvas.height);
                }

                pdf.save('document_annote.pdf');

            } catch (e) {
                console.error("Erreur d'export:", e);
                alert("Une erreur est survenue lors de l'exportation.");
            } finally {
                restoreCurrentPageData();
                btn.innerText = "Exporter PDF";
                btn.disabled = false;
                loader.style.display = 'none';
                loader.innerText = "Chargement...";
            }
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
