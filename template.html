<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- Configuration mobile-friendly, empêche le zoom natif du navigateur -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FillYourPDF Document</title>
    
    <!-- pdf.js pour le rendu du PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- jsPDF pour l'export final -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* Base UI minimaliste */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f3f4f6; /* Gris clair neutre */
            font-family: Arial, sans-serif;
            touch-action: none; /* Désactive les gestes par défaut du navigateur (pull to refresh, etc) */
        }

        #app-container {
            width: 100%;
            height: calc(100% - 60px); /* Laisse 60px pour la toolbar en bas */
            position: relative;
            overflow: hidden;
        }

        #workspace {
            position: absolute;
            transform-origin: 0 0;
            /* Transform (pan/zoom) appliqué en JS */
        }

        .page-container {
            position: relative;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin: 20px; /* Marge autour du document */
        }

        /* Les canvas et le calque texte sont superposés parfaitement */
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #pdf-canvas { z-index: 1; }
        #draw-canvas { z-index: 2; }
        
        #text-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none; /* Les clics passent à travers sauf sur le texte lui-même */
        }

        /* Style des zones de texte ajoutées */
        .text-annotation {
            position: absolute;
            pointer-events: auto; /* Rend le texte cliquable/éditable */
            border: 1px dashed transparent;
            padding: 4px;
            min-width: 20px;
            min-height: 20px;
            font-family: Arial, sans-serif;
            outline: none;
            background: transparent;
            white-space: pre-wrap;
            word-wrap: break-word;
            cursor: text;
            line-height: 1.2;
        }

        .text-annotation:focus, .text-annotation:hover {
            border-color: #3b82f6; /* Bleu quand actif */
            background: rgba(255, 255, 255, 0.7);
        }

        /* Toolbar en bas */
        #toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }

        button {
            border: none;
            background: #f3f4f6;
            border-radius: 12px;
            width: 48px;
            height: 48px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #4b5563;
        }

        button:hover { background: #e5e7eb; }
        
        /* Bouton actif */
        button.active {
            background: #3b82f6;
            color: white;
        }

        /* Menus d'options (tailles) */
        .tool-options {
            display: none;
            position: fixed;
            bottom: 75px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            gap: 8px;
            z-index: 10;
        }

        .tool-options.visible { display: flex; }

        .option-btn {
            width: 36px;
            height: 36px;
            font-size: 14px;
            border: 2px solid transparent;
        }

        .option-btn.active {
            border-color: #3b82f6;
            background: #eff6ff;
        }

        /* Bouton Export spécial */
        #export-btn {
            width: auto;
            padding: 0 20px;
            font-size: 16px;
            font-weight: bold;
            background: #10b981;
            color: white;
            margin-left: 20px;
        }

        #export-btn:hover { background: #059669; }

        /* Loader */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: #4b5563;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loader">Chargement du document...</div>

    <div id="app-container">
        <div id="workspace">
            <div class="page-container" id="page-container">
                <canvas id="pdf-canvas"></canvas>
                <canvas id="draw-canvas"></canvas>
                <div id="text-layer"></div>
            </div>
        </div>
    </div>

    <!-- Sélecteurs de tailles de stylo -->
    <div id="pen-options" class="tool-options" style="left: calc(50% - 110px);">
        <button class="option-btn active" data-size="2" style="border-radius: 50%;">
            <div style="width: 4px; height: 4px; background: currentColor; border-radius: 50%;"></div>
        </button>
        <button class="option-btn" data-size="5" style="border-radius: 50%;">
            <div style="width: 10px; height: 10px; background: currentColor; border-radius: 50%;"></div>
        </button>
        <button class="option-btn" data-size="12" style="border-radius: 50%;">
            <div style="width: 18px; height: 18px; background: currentColor; border-radius: 50%;"></div>
        </button>
    </div>

    <!-- Sélecteurs de tailles de texte -->
    <div id="text-options" class="tool-options" style="left: calc(50% - 50px);">
        <button class="option-btn" data-size="12">P</button>
        <button class="option-btn active" data-size="18">M</button>
        <button class="option-btn" data-size="28">G</button>
    </div>

    <div id="toolbar">
        <button id="btn-main" class="active" title="Main (Déplacer/Zoomer)">✋</button>
        <button id="btn-pen" title="Stylo (Dessiner)">✏️</button>
        <button id="btn-text" title="Texte">T</button>
        <button id="export-btn">Exporter en PDF</button>
    </div>

    <!-- Conteneur des données PDF injectées par le script Node -->
    <script id="pdf-data" type="text/plain">{{PDF_BASE64}}</script>

    <script>
        // Configuration de base pour pdf.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Variables d'état
        let currentMode = 'MAIN'; // 'MAIN', 'PEN', 'TEXT'
        let currentPenSize = 2;
        let currentTextSize = 18;
        
        let transform = { scale: 1, x: 0, y: 0 };
        let isPanning = false;
        let startPan = { x: 0, y: 0 };
        let isDrawing = false;
        let lastDrawPoint = null;

        // Éléments du DOM
        const appContainer = document.getElementById('app-container');
        const workspace = document.getElementById('workspace');
        const pageContainer = document.getElementById('page-container');
        const pdfCanvas = document.getElementById('pdf-canvas');
        const drawCanvas = document.getElementById('draw-canvas');
        const textLayer = document.getElementById('text-layer');
        const loader = document.getElementById('loader');
        
        const pdfCtx = pdfCanvas.getContext('2d');
        const drawCtx = drawCanvas.getContext('2d');

        // Qualité de rendu (2 = rendu HD "retina")
        const RENDER_SCALE = 2.0;

        /**
         * Initialisation du document PDF
         */
        async function init() {
            const base64Data = document.getElementById('pdf-data').textContent.trim();
            
            if (!base64Data || base64Data === '{{PDF_BASE64}}') {
                loader.innerText = "Mode Dev : Aucun PDF injecté. Espace de travail vide.";
                setupCanvas(1000, 1400); // Taille A4 standard approx
                centerDocument();
                return;
            }

            try {
                // Conversion Base64 -> Uint8Array
                const binaryString = window.atob(base64Data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Chargement via pdf.js
                const pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
                const pdfPage = await pdfDoc.getPage(1); // Prototype : on prend la première page
                
                // Rendu de la page
                const viewport = pdfPage.getViewport({ scale: RENDER_SCALE });
                setupCanvas(viewport.width, viewport.height);

                await pdfPage.render({
                    canvasContext: pdfCtx,
                    viewport: viewport
                }).promise;

                loader.style.display = 'none'; // Cacher le loader
                centerDocument();

            } catch (err) {
                console.error("Erreur au chargement du PDF:", err);
                loader.innerText = "Erreur de chargement du PDF.";
            }
        }

        /**
         * Prépare les canvas à la bonne dimension
         */
        function setupCanvas(w, h) {
            pageContainer.style.width = `${w}px`;
            pageContainer.style.height = `${h}px`;
            
            pdfCanvas.width = w;
            pdfCanvas.height = h;
            
            drawCanvas.width = w;
            drawCanvas.height = h;
            
            // Config du contexte de dessin
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';
            drawCtx.strokeStyle = 'black'; // Couleur unique pour le minimalisme
        }

        /**
         * Centre et ajuste le zoom du document à l'écran
         */
        function centerDocument() {
            const rect = appContainer.getBoundingClientRect();
            // Zoom pour voir toute la page avec une marge
            transform.scale = Math.min(
                (rect.width - 40) / pdfCanvas.width, 
                (rect.height - 40) / pdfCanvas.height
            );
            transform.x = (rect.width - pdfCanvas.width * transform.scale) / 2;
            transform.y = (rect.height - pdfCanvas.height * transform.scale) / 2;
            updateTransform();
        }

        /**
         * Applique le Pan/Zoom via CSS Transform
         */
        function updateTransform() {
            workspace.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`;
        }

        /**
         * Gestion de l'UI (Toolbar)
         */
        document.getElementById('btn-main').addEventListener('click', () => setMode('MAIN'));
        document.getElementById('btn-pen').addEventListener('click', () => setMode('PEN'));
        document.getElementById('btn-text').addEventListener('click', () => setMode('TEXT'));

        document.querySelectorAll('#pen-options .option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#pen-options .option-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentPenSize = parseInt(e.currentTarget.dataset.size);
            });
        });

        document.querySelectorAll('#text-options .option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#text-options .option-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentTextSize = parseInt(e.currentTarget.dataset.size);
            });
        });

        function setMode(mode) {
            currentMode = mode;
            // Maj visuelle des boutons
            document.getElementById('btn-main').classList.toggle('active', mode === 'MAIN');
            document.getElementById('btn-pen').classList.toggle('active', mode === 'PEN');
            document.getElementById('btn-text').classList.toggle('active', mode === 'TEXT');
            
            // Menus d'options
            document.getElementById('pen-options').classList.toggle('visible', mode === 'PEN');
            document.getElementById('text-options').classList.toggle('visible', mode === 'TEXT');

            // Curseur du canvas
            if (mode === 'MAIN') drawCanvas.style.cursor = 'grab';
            else if (mode === 'PEN') drawCanvas.style.cursor = 'crosshair';
            else if (mode === 'TEXT') drawCanvas.style.cursor = 'text';
        }
        setMode('MAIN');

        /**
         * Gestion de la souris / Touch pour le zoom (Molette & Pinch)
         */
        appContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.ctrlKey || e.metaKey || currentMode === 'MAIN') {
                // Zoom
                const zoomIntensity = 0.002;
                const wheel = e.deltaY < 0 ? 1 : -1;
                const zoomFactor = Math.exp(wheel * zoomIntensity * 20);
                
                const rect = appContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                // Zoom vers le curseur
                transform.x = mouseX - (mouseX - transform.x) * zoomFactor;
                transform.y = mouseY - (mouseY - transform.y) * zoomFactor;
                transform.scale *= zoomFactor;
                
                // Limites du zoom
                transform.scale = Math.max(0.1, Math.min(transform.scale, 5));
                updateTransform();
            } else {
                // Pan avec le trackpad
                transform.x -= e.deltaX;
                transform.y -= e.deltaY;
                updateTransform();
            }
        }, { passive: false });

        /**
         * Logique d'interaction sur le canvas (Dessin & Drag)
         */
        function getCanvasCoords(e) {
            const rect = drawCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            // On divise par le scale pour avoir les coords exactes sur le canvas d'origine (non zoomé)
            return {
                x: (clientX - rect.left) / transform.scale,
                y: (clientY - rect.top) / transform.scale
            };
        }

        let initialPinchDistance = null;
        let initialScale = 1;

        // Events de début (mousedown/touchstart)
        drawCanvas.addEventListener('mousedown', handlePointerDown);
        drawCanvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                // Pinch to zoom (2 doigts)
                isDrawing = false;
                isPanning = false;
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialScale = transform.scale;
            } else if (e.touches.length === 1) {
                handlePointerDown(e);
            }
        }, { passive: false });

        // Events de mouvement
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDistance) {
                e.preventDefault();
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const pinchScale = currentDistance / initialPinchDistance;
                transform.scale = initialScale * pinchScale;
                transform.scale = Math.max(0.1, Math.min(transform.scale, 5));
                updateTransform();
            } else if (e.touches.length === 1) {
                handlePointerMove(e);
            }
        }, { passive: false });

        // Events de fin
        window.addEventListener('mouseup', handlePointerUp);
        window.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) initialPinchDistance = null;
            handlePointerUp(e);
        });

        function handlePointerDown(e) {
            if (currentMode === 'MAIN' || e.button === 1 || e.button === 2) {
                // Début du Pan
                isPanning = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startPan = { x: clientX - transform.x, y: clientY - transform.y };
                if (currentMode === 'MAIN') drawCanvas.style.cursor = 'grabbing';
            } 
            else if (currentMode === 'PEN') {
                // Début du dessin
                isDrawing = true;
                lastDrawPoint = getCanvasCoords(e);
                
                // Dessine un point unique si simple clic
                drawCtx.lineWidth = currentPenSize * RENDER_SCALE; // Ajuste la taille selon le scale du canvas
                drawCtx.beginPath();
                drawCtx.arc(lastDrawPoint.x, lastDrawPoint.y, (currentPenSize * RENDER_SCALE) / 2, 0, Math.PI * 2);
                drawCtx.fill();
            } 
            else if (currentMode === 'TEXT') {
                // Ajout de texte
                const coords = getCanvasCoords(e);
                addTextAnnotation(coords.x, coords.y);
                setMode('MAIN'); // Repasse en main direct pour éviter d'en spammer
            }
        }

        function handlePointerMove(e) {
            if (isPanning) {
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                transform.x = clientX - startPan.x;
                transform.y = clientY - startPan.y;
                updateTransform();
            } 
            else if (isDrawing && currentMode === 'PEN') {
                e.preventDefault();
                const coords = getCanvasCoords(e);
                drawCtx.lineWidth = currentPenSize * RENDER_SCALE;
                drawCtx.beginPath();
                drawCtx.moveTo(lastDrawPoint.x, lastDrawPoint.y);
                drawCtx.lineTo(coords.x, coords.y);
                drawCtx.stroke();
                lastDrawPoint = coords;
            }
        }

        function handlePointerUp() {
            isPanning = false;
            isDrawing = false;
            if (currentMode === 'MAIN') drawCanvas.style.cursor = 'grab';
        }

        /**
         * Gestion des zones de texte
         */
        function addTextAnnotation(x, y) {
            const div = document.createElement('div');
            div.className = 'text-annotation';
            div.contentEditable = true;
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            
            // On ajuste la taille de la police au RENDER_SCALE du canvas
            div.style.fontSize = `${currentTextSize * RENDER_SCALE}px`;
            
            // Variables pour le drag & drop du texte
            let isDraggingText = false;
            let startTextPos = {x: 0, y: 0};
            
            div.addEventListener('mousedown', (e) => {
                if (currentMode !== 'TEXT' && document.activeElement !== div) {
                    isDraggingText = true;
                    startTextPos = {
                        x: e.clientX,
                        y: e.clientY,
                        left: parseFloat(div.style.left),
                        top: parseFloat(div.style.top)
                    };
                    e.stopPropagation(); // Évite que le canvas prenne le focus/pan
                }
            });

            // Touch support pour déplacer le texte
            div.addEventListener('touchstart', (e) => {
                if (currentMode !== 'TEXT' && document.activeElement !== div && e.touches.length === 1) {
                    isDraggingText = true;
                    startTextPos = {
                        x: e.touches[0].clientX,
                        y: e.touches[0].clientY,
                        left: parseFloat(div.style.left),
                        top: parseFloat(div.style.top)
                    };
                    e.stopPropagation();
                }
            }, {passive: false});

            window.addEventListener('mousemove', handleTextMove);
            window.addEventListener('touchmove', (e) => {
                if(isDraggingText) {
                    e.preventDefault();
                    handleTextMove({clientX: e.touches[0].clientX, clientY: e.touches[0].clientY});
                }
            }, {passive: false});

            function handleTextMove(e) {
                if (isDraggingText) {
                    const dx = (e.clientX - startTextPos.x) / transform.scale;
                    const dy = (e.clientY - startTextPos.y) / transform.scale;
                    div.style.left = `${startTextPos.left + dx}px`;
                    div.style.top = `${startTextPos.top + dy}px`;
                }
            }

            window.addEventListener('mouseup', () => isDraggingText = false);
            window.addEventListener('touchend', () => isDraggingText = false);

            // Supprime la div si elle est vide à la perte de focus
            div.addEventListener('blur', () => {
                if (div.innerText.trim() === '') {
                    div.remove();
                }
            });

            textLayer.appendChild(div);
            
            // Met le curseur dedans directement
            setTimeout(() => div.focus(), 50);
        }

        /**
         * Export Final : Combinaison de tout (PDF + Traits + Texte) en un nouveau PDF
         */
        document.getElementById('export-btn').addEventListener('click', () => {
            const btn = document.getElementById('export-btn');
            const originalText = btn.innerText;
            btn.innerText = "Génération...";
            btn.disabled = true;

            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    
                    // On crée un canvas offscreen pour fusionner tous les calques
                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = pdfCanvas.width;
                    finalCanvas.height = pdfCanvas.height;
                    const finalCtx = finalCanvas.getContext('2d');
                    
                    // 1. Fond blanc au cas où
                    finalCtx.fillStyle = 'white';
                    finalCtx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

                    // 2. Le PDF d'origine
                    finalCtx.drawImage(pdfCanvas, 0, 0);
                    
                    // 3. Les traits de stylo
                    finalCtx.drawImage(drawCanvas, 0, 0);
                    
                    // 4. Les textes HTML -> dessinés sur le canvas
                    const texts = document.querySelectorAll('.text-annotation');
                    texts.forEach(txt => {
                        const x = parseFloat(txt.style.left);
                        const y = parseFloat(txt.style.top);
                        const fontSize = parseFloat(txt.style.fontSize); // Déjà scale
                        
                        finalCtx.font = `${fontSize}px Arial`;
                        finalCtx.fillStyle = 'black';
                        finalCtx.textBaseline = 'top';
                        
                        // Gestion basique des sauts de ligne
                        const lines = txt.innerText.split('\n');
                        let currentY = y + 4; // petit padding
                        lines.forEach(line => {
                            finalCtx.fillText(line, x + 4, currentY); // +4 = padding de la div
                            currentY += fontSize * 1.2; // interligne
                        });
                    });

                    // 5. Génération jsPDF
                    // On exporte en haute qualité JPEG
                    const imgData = finalCanvas.toDataURL('image/jpeg', 0.95);
                    
                    // Choix de l'orientation (portrait / paysage)
                    const orientation = pdfCanvas.width > pdfCanvas.height ? 'l' : 'p';
                    
                    // On crée le PDF aux dimensions du canvas (en pixels/points jsPDF)
                    const pdf = new jsPDF(orientation, 'px', [pdfCanvas.width, pdfCanvas.height]);
                    
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfCanvas.width, pdfCanvas.height);
                    pdf.save('document_annote.pdf');

                } catch (e) {
                    console.error("Erreur d'export:", e);
                    alert("Une erreur est survenue lors de l'exportation.");
                } finally {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            }, 100); // Laisse le temps à l'UI de s'actualiser
        });

        // Lancement au démarrage
        window.addEventListener('load', init);
    </script>
</body>
</html>
